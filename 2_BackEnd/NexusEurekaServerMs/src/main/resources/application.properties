# Nombre de la aplicacion que se mostrara en el dashboard de Eureka.
spring.application.name=${EUREKA_APP_NAME:nexus-eureka-server}

# Puerto del servidor Eureka.
server.port=${EUREKA_SERVER_PORT:8761}

# Host visible del servidor Eureka.
eureka.instance.hostname=${EUREKA_HOSTNAME:localhost}

# Configuracion minima para ejecutar Eureka en modo standalone.
eureka.client.register-with-eureka=false
eureka.client.fetch-registry=false
eureka.client.serviceUrl.defaultZone=${EUREKA_DEFAULT_ZONE:http://${eureka.instance.hostname}:${server.port}/eureka/}